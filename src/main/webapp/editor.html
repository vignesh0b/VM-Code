<!DOCTYPE html>
<html>
<head>
    <title>VM Code Editor</title>

    <!-- Monaco Editor -->
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f9fafb;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .title {
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* AI BUTTON */
        .ai-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .ai-btn:hover {
            background: #059669;
        }

        /* LANGUAGE BUTTON */
        .lang {
            background: #6366f1;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
        }

        /* RUN BUTTON */
        .run-btn {
            background: #e11d48;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 95px;
            justify-content: center;
        }

        .run-btn:hover {
            background: #be123c;
            transform: scale(1.05);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-left: 10px solid white;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }

        /* MAIN */
        .container {
            display: flex;
            height: 90vh;
        }

        #editor {
            width: 65%;
        }

        .right {
            width: 35%;
            border-left: 1px solid #e5e7eb;
            padding: 15px;
            background: white;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 8px;
        }

        pre {
            background: #111;
            color: #00ff88;
            padding: 10px;
            height: 200px;
            overflow: auto;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="title">Main.java</div>

    <div class="controls">
        <button class="ai-btn">AI</button>
        <button class="lang">JAVA</button>

        <button class="run-btn" onclick="runCode()" id="runBtn">
            RUN <span class="play-icon"></span>
        </button>
    </div>
</div>

<!-- MAIN -->
<div class="container">
    <div id="editor"></div>

    <div class="right">
        <h4>Output</h4>
        <pre id="output">Click RUN to see output</pre>
    </div>
</div>

<script>
    let editor;

    // Monaco load
    require.config({
        paths: { vs: 'https://unpkg.com/monaco-editor@latest/min/vs' }
    });

    require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(document.getElementById("editor"), {
            value: `public class Main {
    public static void main(String[] args) {
        System.out.println("Hello, World!");
    }
}`,
            language: "java",
            theme: "vs-light",

            // UI cleanup
            minimap: { enabled: false },
            glyphMargin: false,
            folding: false,
            lineNumbersMinChars: 3
        });
    });

    function runCode() {
    if (!editor) return;

    const btn = document.getElementById("runBtn");
    const outputBox = document.getElementById("output");

    btn.innerHTML = "Running...";
    btn.disabled = true;
    outputBox.innerText = "Running...";

    const code = editor.getValue();

    fetch("/api/run", {
        method: "POST",
        headers: {
            "Content-Type": "text/plain"
        },
        body: code
    })
    .then(res => res.text())
    .then(output => {
        outputBox.innerText = output || "No output";
    })
    .catch(err => {
        console.error(err);
        outputBox.innerText = "Server error";
    })
    .finally(() => {
        btn.innerHTML = 'RUN <span class="play-icon"></span>';
        btn.disabled = false;
    });
}
</script>

</body>
</html>
