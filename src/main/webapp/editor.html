<!DOCTYPE html>
<html>
<head>
    <title>VM Code Editor</title>

    <!-- Monaco Editor -->
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f9fafb;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ai-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
        }

        .lang {
            background: #6366f1;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .run-btn {
            background: #e11d48;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* MAIN */
        .container {
            display: flex;
            height: 90vh;
        }

        #editor {
            width: 65%;
        }

        .right {
            width: 35%;
            border-left: 1px solid #e5e7eb;
            padding: 15px;
            background: white;
        }

        /* OUTPUT PANEL */
        #output {
    background: #000000;
    color: #00ff88;

    padding: 16px;
    height: 500px;
    overflow-y: auto;

    border-radius: 12px;
    border: 1px solid #222;

    font-family: monospace;
    font-size: 14px;
    white-space: pre-wrap;

    outline: none;
    caret-color: #00ff88;
    line-height: 1.5;

    box-shadow: 0 0 10px rgba(0,255,136,0.2);
}
    </style>
</head>

<body>

<div class="header">
    <div>Main.java</div>

    <div class="controls">
        <button class="ai-btn">AI</button>
        <button class="lang">JAVA</button>
        <button class="run-btn" onclick="runCode()">RUN</button>
    </div>
</div>

<div class="container">
    <div id="editor"></div>

    <div class="right">
        <h4>Output</h4>
        <pre id="output" contenteditable="true" tabindex="0"></pre>
    </div>
</div>

<script>
    let editor;

    // Monaco setup
    require.config({
        paths: { vs: 'https://unpkg.com/monaco-editor@latest/min/vs' }
    });

    require(["vs/editor/editor.main"], function () {
        editor = monaco.editor.create(document.getElementById("editor"), {
            value: `import java.util.*;

    public class Main {
        public static void main(String[] args) {
            Scanner sc = new Scanner(System.in);
            System.out.println("Enter the name : ");
            String a = sc.next();
        }
    }`,
            language: "java",
            theme: "vs-light",
            minimap: { enabled: false }
        });
    });

    let socket;
    let isRunning = false;
    let inputBuffer = "";

    const output = document.getElementById("output");

    function runCode() {
        output.innerText = "";
        output.focus();

        socket = new WebSocket("ws://localhost:9090/ws");

        socket.onopen = () => {
            isRunning = true;
            socket.send("CODE:" + editor.getValue());
        };

        socket.onmessage = (event) => {
            output.innerText += event.data;
            output.scrollTop = output.scrollHeight;
        };

        socket.onclose = () => {
            isRunning = false;
        };
    }

    // 🔥 INPUT HANDLER (FINAL FIXED)
    output.addEventListener("keydown", function (e) {

        if (!isRunning || !socket) return;

        e.preventDefault();

        if (e.key === "Enter") {
            socket.send(inputBuffer);        // send to Java
            output.innerText += "\n";        // move cursor
            inputBuffer = "";
        }

        else if (e.key === "Backspace") {
            if (inputBuffer.length > 0) {
                inputBuffer = inputBuffer.slice(0, -1);
                output.innerText = output.innerText.slice(0, -1);
            }
        }

        else if (e.key.length === 1) {
            inputBuffer += e.key;
            output.innerText += e.key;       // show typing
        }

        output.scrollTop = output.scrollHeight;
    });

    // focus on click
    output.addEventListener("click", () => output.focus());

</script>

</body>
</html>
